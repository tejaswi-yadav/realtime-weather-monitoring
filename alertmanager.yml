global:
  resolve_timeout: 5m
  # Gmail SMTP configuration
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'pavaniankitha075@gmail.com'
  smtp_auth_username: 'pavaniankitha075@gmail.com'
  smtp_auth_password: 'anavrosbibsgkekp'
  smtp_require_tls: true

# Route configuration
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 5m  # Send repeat notifications every 5 minutes
  receiver: 'email-notifications'
  
  # Child routes for different severity levels
  routes:
    - match:
        severity: critical
      receiver: 'email-notifications'
      continue: true
    
    - match:
        severity: warning
      receiver: 'email-notifications'
      continue: true
    
    - match:
        severity: info
      receiver: 'email-notifications'
      continue: true

# Receivers configuration
receivers:
  - name: 'email-notifications'
    email_configs:
      - to: 'pavaniankitha075@gmail.com'
        headers:
          Subject: '🚨 Weather Alert: {{ .GroupLabels.alertname }} - {{ .GroupLabels.severity }}'
        html: |
          <!DOCTYPE html>
          <html>
          <head>
            <style>
              body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
              .container { max-width: 600px; margin: 0 auto; padding: 20px; }
              .header { background: #f44336; color: white; padding: 15px; border-radius: 5px 5px 0 0; }
              .header.warning { background: #ff9800; }
              .header.info { background: #2196F3; }
              .alert-box { border: 1px solid #ddd; border-radius: 0 0 5px 5px; padding: 15px; background: #f9f9f9; }
              .alert-item { margin: 10px 0; padding: 10px; background: white; border-left: 4px solid #f44336; }
              .alert-item.warning { border-left-color: #ff9800; }
              .alert-item.info { border-left-color: #2196F3; }
              .label { font-weight: bold; color: #555; }
              .value { color: #000; }
              .timestamp { color: #666; font-size: 0.9em; }
            </style>
          </head>
          <body>
            <div class="container">
              <div class="header {{ .GroupLabels.severity }}">
                <h2>Weather Alert Notification</h2>
                <p>Alert: {{ .GroupLabels.alertname }}</p>
                <p>Severity: {{ .GroupLabels.severity | toUpper }}</p>
              </div>
              <div class="alert-box">
                {{ range .Alerts }}
                <div class="alert-item {{ .Labels.severity }}">
                  <h3>{{ .Annotations.summary }}</h3>
                  <p><span class="label">Description:</span> <span class="value">{{ .Annotations.description }}</span></p>
                  {{ if .Labels.city }}
                  <p><span class="label">Location:</span> <span class="value">{{ .Labels.city }} ({{ .Labels.zip_code }})</span></p>
                  {{ end }}
                  {{ if .Labels.datetime }}
                  <p><span class="label">Time:</span> <span class="value">{{ .Labels.datetime }}</span></p>
                  {{ end }}
                  <p class="timestamp">
                    <span class="label">Alert Started:</span> {{ .StartsAt.Format "2006-01-02 15:04:05" }}<br>
                    {{ if .EndsAt }}
                    <span class="label">Alert Ended:</span> {{ .EndsAt.Format "2006-01-02 15:04:05" }}
                    {{ else }}
                    <span class="label">Status:</span> <span style="color: #f44336;">🔴 ACTIVE</span>
                    {{ end }}
                  </p>
                </div>
                {{ end }}
                
                <div style="margin-top: 20px; padding: 10px; background: #e3f2fd; border-radius: 5px;">
                  <p style="margin: 5px 0;"><strong>Total Alerts:</strong> {{ .Alerts | len }}</p>
                  <p style="margin: 5px 0;"><strong>Group:</strong> {{ .GroupLabels.alertname }}</p>
                </div>
              </div>
              
              <div style="margin-top: 20px; text-align: center; color: #666; font-size: 0.9em;">
                <p>This is an automated alert from Weather Monitoring System</p>
                <p>View details: <a href="http://localhost:9093">AlertManager Dashboard</a> | <a href="http://localhost:9090">Prometheus</a></p>
              </div>
            </div>
          </body>
          </html>
        send_resolved: true

  - name: 'devnull'
    # No configuration - alerts go nowhere

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'city', 'zip_code']
  
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'info'
    equal: ['alertname', 'city', 'zip_code']
  
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'city', 'zip_code']